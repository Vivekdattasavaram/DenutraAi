name: Web Selenium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        working-directory: fastapi_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI Backend & Create User
        working-directory: fastapi_backend
        run: |
          python seed_db.py
          python create_admin.py savaramvivekdatta@gmail.com
          uvicorn main:app --port 8000 &
          npx wait-on tcp:8000 -t 30000

      - name: Install Frontend Dependencies
        working-directory: react_frontend
        run: npm install

      - name: Install Selenium Dependencies
        working-directory: react_frontend/selenium-tests
        run: npm install

      - name: Export Web Build
        working-directory: react_frontend
        run: npx expo export --platform web

      - name: Serve Web App & Run Selenium Tests
        working-directory: react_frontend
        run: |
          mkdir -p public_html/DenutraAi
          cp -r dist/* public_html/DenutraAi/
          npx serve public_html -p 8081 &
          npx wait-on tcp:8081 -t 30000
          cd selenium-tests
          BASE_URL=http://localhost:8081/DenutraAi npm run login || true

      - name: Upload Selenium HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-E2E-Report
          path: react_frontend/selenium-tests/reports/
          retention-days: 30

      - name: Publish Selenium Report to GitHub Pages Summary
        if: always()
        run: |
          echo "## 🧪 Selenium E2E Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "react_frontend/selenium-tests/reports/selenium-report.json" ]; then
            STATS=$(cat react_frontend/selenium-tests/reports/selenium-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          stats = data.get('stats', {})
          print(f\"| Total | Passed | Failed | Duration |\"  )
          print(f\"|-------|--------|--------|----------|\"  )
          print(f\"| {stats.get('tests',0)} | {stats.get('passes',0)} | {stats.get('failures',0)} | {round(stats.get('duration',0)/1000,2)}s |\"  )
          ")
            echo "$STATS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            PASSES=$(cat react_frontend/selenium-tests/reports/selenium-report.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('stats',{}).get('passes',0))")
            FAILURES=$(cat react_frontend/selenium-tests/reports/selenium-report.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('stats',{}).get('failures',0))")
            if [ "$FAILURES" = "0" ]; then
              echo "### ✅ All tests PASSED" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ $FAILURES test(s) FAILED — $PASSES passed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Report file not found." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📥 Download the full HTML report from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
