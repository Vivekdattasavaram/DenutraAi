name: Web Selenium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        working-directory: fastapi_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI Backend & Create User
        working-directory: fastapi_backend
        run: |
          python seed_db.py
          python create_admin.py savaramvivekdatta@gmail.com
          uvicorn main:app --port 8000 &
          npx wait-on tcp:8000 -t 30000

      - name: Install Frontend Dependencies
        working-directory: react_frontend
        run: npm install

      - name: Install Selenium Dependencies
        working-directory: react_frontend/selenium-tests
        run: npm install

      - name: Export Web Build
        working-directory: react_frontend
        run: npx expo export --platform web

      - name: Serve Web App & Run Selenium Tests
        working-directory: react_frontend
        run: |
          mkdir -p public_html/DenutraAi
          cp -r dist/* public_html/DenutraAi/
          npx serve public_html -p 8081 &
          npx wait-on tcp:8081 -t 30000
          cd selenium-tests
          BASE_URL=http://localhost:8081/DenutraAi npm run login || true

      - name: Add index page linking to Selenium Report
        if: always()
        run: |
          mkdir -p react_frontend/selenium-tests/reports
          cat > react_frontend/selenium-tests/reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=selenium-report.html" />
            <title>Redirecting to Selenium Report...</title>
          </head>
          <body>
            <p>Redirecting to <a href="selenium-report.html">Selenium E2E Report</a>...</p>
          </body>
          </html>
          EOF

      - name: Print Test Report Summary
        if: always()
        run: |
          echo "## 🧪 Selenium E2E Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "react_frontend/selenium-tests/reports/selenium-report.json" ]; then
            python3 -c "
          import json, sys
          with open('react_frontend/selenium-tests/reports/selenium-report.json') as f:
            data = json.load(f)
          stats = data.get('stats', {})
          print('| Total | Passed | Failed | Duration |')
          print('|-------|--------|--------|----------|')
          print(f\"| {stats.get('tests',0)} | {stats.get('passes',0)} | {stats.get('failures',0)} | {round(stats.get('duration',0)/1000,2)}s |\")
          failures = stats.get('failures', 0)
          passes = stats.get('passes', 0)
          if failures == 0:
            print('')
            print('### ✅ All tests PASSED')
          else:
            print('')
            print(f'### ❌ {failures} test(s) FAILED — {passes} passed')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Report not generated." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 [View Live Test Report](https://Vivekdattasavaram.github.io/DenutraAi/reports/selenium-report.html)" >> $GITHUB_STEP_SUMMARY

      - name: Deploy Selenium Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: react_frontend/selenium-tests/reports
          destination_dir: reports
          keep_files: true
