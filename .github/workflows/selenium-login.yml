name: Web Selenium E2E Tests

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
selenium-tests:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install Frontend Dependencies
    working-directory: react_frontend
    run: npm install

  - name: Install Selenium Dependencies
    working-directory: react_frontend/selenium-tests
    run: npm install

  - name: Export Web Build
    working-directory: react_frontend
    run: npx expo export --platform web

  - name: Install Static Server
    run: npm install -g serve

  - name: Serve Web Build
    working-directory: react_frontend
    run: |
      serve dist -p 8081 &
      sleep 10

  - name: Verify Web Server
    run: |
      curl -I http://localhost:8081

  - name: Run Selenium Login Test
    working-directory: react_frontend/selenium-tests
    run: npm run login
```
